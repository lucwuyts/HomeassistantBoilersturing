template:

  - binary_sensor:

      - name: Boiler Superdal
        unique_id: boiler_superdal
        state: >
          {{ now().hour >= 11 and now().hour < 17 }}

      - name: Boiler Allow Heat
        unique_id: boiler_allow_heat
        state: >
          {{ is_state('binary_sensor.boiler_superdal','on') }}

      - name: Boiler Heating Allowed
        unique_id: boiler_heating_allowed
        state: >
          {{
             (
               is_state('binary_sensor.boiler_superdal', 'on')
               or
               is_state('input_boolean.boiler_superdal_force', 'on')
             )
          }}

  - sensor:

      - name: Boiler Predicted Quarter Peak W
        unique_id: boiler_predicted_quarter_peak_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set average_state = states('sensor.peak_current_average_quarterly_demand_2') %}
          {% set average_kw = average_state | float(0) %}
          {% set average_w = average_kw * 1000 %}
          {% set boiler_w = states('sensor.boiler_power') | float(1500) %}

          {% if average_state in ['unknown', 'unavailable', 'none'] or average_w <= 0 %}
            0
          {% elif is_state('switch.boiler_shelly','on') %}
            {{ average_w | round(0) }}
          {% elif is_state('binary_sensor.boiler_heating_allowed', 'on') %}
            {{ (average_w + boiler_w) | round(0) }}
          {% else %}
            {{ average_w | round(0) }}
          {% endif %}

      - name: Boiler Peak Margin W
        unique_id: boiler_peak_margin_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {{
            (
              states('sensor.boiler_peak_limit') | float(0)
              -
              states('sensor.boiler_predicted_quarter_peak_w') | float(0)
            ) | round(0)
          }}

      - name: Boiler House Power
        unique_id: boiler_house_power
        unit_of_measurement: W
        device_class: power
        state: >
          {{ states('sensor.verbruik_boven_4') | float(0) | round(0) }}

      - name: Boiler Peak Limit
        unique_id: boiler_peak_limit
        unit_of_measurement: W
        device_class: power
        state: >
          {{ states('input_number.boiler_peak_limit') | float(0) | round(0) }}

      - name: Boiler Power
        unique_id: boiler_power
        unit_of_measurement: W
        device_class: power
        state: >
          {{ states('input_number.boiler_power') | float(0) | round(0) }}

      - name: Shelly Boiler Relay Numeric
        unique_id: shelly_boiler_relay_numeric
        unit_of_measurement: "1"
        state_class: measurement
        state: >
          {{ 1 if is_state('binary_sensor.shelly_boiler_relay', 'on') else 0 }}

      - name: Shelly Boiler Restart Delay Active Numeric
        unique_id: shelly_boiler_restart_delay_active_numeric
        unit_of_measurement: "1"
        state_class: measurement
        state: >
          {{ 1 if is_state('binary_sensor.shelly_boiler_restart_delay_active', 'on') else 0 }}
      - name: Boiler Reason
        unique_id: boiler_reason
        state: >
          {% if is_state('input_boolean.boiler_controller_enabled', 'off') %}
            2
          {% elif not (
              is_state('binary_sensor.boiler_superdal', 'on')
              or
              is_state('input_boolean.boiler_superdal_force', 'on')
          ) %}
            1
          {% elif is_state('input_boolean.boiler_today_completed', 'on') %}
            3
          {% elif states('sensor.boiler_peak_margin_w') | float(0) < 0 %}
            5
          {% else %}
            0
          {% endif %}

      - name: Boiler Reason Text
        unique_id: boiler_reason_text
        state: >
          {% set reason = states('sensor.boiler_reason') | int %}

          {% if reason == 0 %}
            OK
          {% elif reason == 1 %}
            Geen superdaluren
          {% elif reason == 2 %}
            Controller uitgeschakeld
          {% elif reason == 3 %}
            Boiler vandaag reeds verwarmd
          {% elif reason == 4 %}
            Wachttijd actief
          {% elif reason == 5 %}
            Verwachte kwartierpiek te hoog
          {% elif reason == 6 %}
            Communicatieprobleem
          {% elif reason == 7 %}
            Fallback actief
          {% else %}
            Onbekend
          {% endif %}

      - name: Boiler Controller State
        unique_id: boiler_controller_state
        state: >
          {% set reason = states('sensor.boiler_reason') | int %}

          {% if reason == 0 %}
            READY
          {% elif reason == 2 %}
            DISABLED
          {% elif reason == 3 %}
            LOCKED
          {% else %}
            WAITING
          {% endif %}









