template:

  - binary_sensor:

      - name: Boiler Superdal
        unique_id: boiler_superdal
        state: >
          {{ now().hour >= 11 and now().hour < 17 }}

      - name: Boiler Nachtuur
        unique_id: boiler_nachtuur
        state: >
          {{ now().hour >= 22 or now().hour < 7 }}

      - name: Boiler Allow Heat
        unique_id: boiler_allow_heat
        state: >
          {{
            is_state('binary_sensor.boiler_superdal','on')
            or
            is_state('binary_sensor.boiler_nachtuur', 'on')
          }}

      - name: Boiler Heating Allowed
        unique_id: boiler_heating_allowed
        state: >
          {{
             (
               is_state('binary_sensor.boiler_superdal', 'on')
               or
               is_state('binary_sensor.boiler_nachtuur', 'on')
               or
               is_state('input_boolean.boiler_superdal_force', 'on')
             )
          }}

      - name: Boiler Shelly Offline
        unique_id: boiler_shelly_offline
        device_class: problem
        state: >
          {% set last_seen = states('sensor.boiler_shelly_last_seen') %}

          {% if last_seen in ['unknown', 'unavailable', 'none', ''] %}
            true
          {% else %}
            {{ (now() - as_datetime(last_seen)).total_seconds() > 300 }}
          {% endif %}

  - sensor:

      - name: Boiler Predicted Quarter Peak W
        unique_id: boiler_predicted_quarter_peak_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {% set previous_w = states('sensor.boiler_predicted_quarter_peak_w') | float(0) %}
          {% set predicted_wh = states('sensor.boiler_predicted_with_boiler_wh') | float(0) %}
          {% set prediction_w = predicted_wh * 4 %}
          {{ previous_w | round(0) if prediction_w <= 0 and previous_w > 0 else prediction_w | round(0) }}

      - name: Boiler Quarter Elapsed Seconds
        unique_id: boiler_quarter_elapsed_seconds
        unit_of_measurement: s
        state_class: measurement
        state: >
          {{ ((now().minute % 15) * 60 + now().second) | int }}

      - name: Boiler Quarter Remaining Seconds
        unique_id: boiler_quarter_remaining_seconds
        unit_of_measurement: s
        state_class: measurement
        state: >
          {% set elapsed = states('sensor.boiler_quarter_elapsed_seconds') | int(0) %}
          {{ [900 - elapsed, 0] | max }}

      - name: Boiler Quarter Energy Wh
        unique_id: boiler_quarter_energy_wh
        unit_of_measurement: Wh
        state_class: measurement
        state: >
          {% set average_state = states('sensor.peak_current_average_quarterly_demand_2') %}
          {% set average_so_far_w = average_state | float(0) * 1000 %}
          {% set elapsed = states('sensor.boiler_quarter_elapsed_seconds') | int(0) %}
          {% set previous_wh = states('sensor.boiler_quarter_energy_wh') | float(0) %}
          {% if average_state in ['unknown', 'unavailable', 'none'] %}
            {{ previous_wh | round(1) }}
          {% else %}
            {{ (average_so_far_w * elapsed / 3600) | round(1) }}
          {% endif %}

      - name: Boiler Quarter Max Energy Wh
        unique_id: boiler_quarter_max_energy_wh
        unit_of_measurement: Wh
        state_class: measurement
        state: >
          {{ (states('sensor.boiler_peak_limit') | float(0) * 0.25) | round(1) }}

      - name: Boiler Predicted With Boiler Wh
        unique_id: boiler_predicted_with_boiler_wh
        unit_of_measurement: Wh
        state_class: measurement
        state: >
          {% set quarter_energy_wh = states('sensor.boiler_quarter_energy_wh') | float(0) %}
          {% set current_power_w = states('sensor.boiler_house_power') | float(0) %}
          {% set boiler_power_w = states('sensor.boiler_power') | float(0) %}
          {% set previous_wh = states('sensor.boiler_predicted_with_boiler_wh') | float(0) %}
          {% set remaining = states('sensor.boiler_quarter_remaining_seconds') | int(0) %}
          {% set boiler_add_w = boiler_power_w if not is_state('binary_sensor.shelly_boiler_relay', 'on') else 0 %}
          {% set projected_power_w = current_power_w + boiler_add_w %}
          {% set prediction_wh = quarter_energy_wh + (projected_power_w * remaining / 3600) %}
          {{ previous_wh | round(1) if prediction_wh <= 0 and previous_wh > 0 else prediction_wh | round(1) }}

      - name: Boiler Predicted Without Boiler Wh
        unique_id: boiler_predicted_without_boiler_wh
        unit_of_measurement: Wh
        state_class: measurement
        state: >
          {% set quarter_energy_wh = states('sensor.boiler_quarter_energy_wh') | float(0) %}
          {% set current_power_w = states('sensor.boiler_house_power') | float(0) %}
          {% set boiler_power_w = states('sensor.boiler_power') | float(0) %}
          {% set remaining = states('sensor.boiler_quarter_remaining_seconds') | int(0) %}
          {% if is_state('binary_sensor.shelly_boiler_relay', 'on') %}
            {% set projected_power_w = [current_power_w - boiler_power_w, 0] | max %}
          {% else %}
            {% set projected_power_w = current_power_w %}
          {% endif %}
          {{ (quarter_energy_wh + (projected_power_w * remaining / 3600)) | round(1) }}

      - name: Boiler Peak Headroom Wh
        unique_id: boiler_peak_headroom_wh
        unit_of_measurement: Wh
        state_class: measurement
        state: >
          {{
            (
              states('sensor.boiler_quarter_max_energy_wh') | float(0)
              -
              states('sensor.boiler_predicted_with_boiler_wh') | float(0)
            ) | round(1)
          }}

      - name: Boiler Latest Safe Off Seconds
        unique_id: boiler_latest_safe_off_seconds
        unit_of_measurement: s
        state_class: measurement
        state: >
          {% set max_wh = states('sensor.boiler_quarter_max_energy_wh') | float(0) %}
          {% set safety_wh = states('input_number.boiler_peak_safety_margin_wh') | float(0) %}
          {% set quarter_energy_wh = states('sensor.boiler_quarter_energy_wh') | float(0) %}
          {% set current_power_w = states('sensor.boiler_house_power') | float(0) %}
          {% set boiler_power_w = states('sensor.boiler_power') | float(0) %}
          {% set remaining = states('sensor.boiler_quarter_remaining_seconds') | int(0) %}
          {% if is_state('binary_sensor.shelly_boiler_relay', 'on') %}
            {% set without_boiler_w = [current_power_w - boiler_power_w, 0] | max %}
          {% else %}
            {% set without_boiler_w = current_power_w %}
          {% endif %}
          {% set allowed_wh = max_wh - safety_wh %}
          {% set without_boiler_future_wh = without_boiler_w * remaining / 3600 %}
          {% if boiler_power_w <= 0 %}
            {{ remaining }}
          {% else %}
            {% set seconds = ((allowed_wh - quarter_energy_wh - without_boiler_future_wh) * 3600 / boiler_power_w) | int(0) %}
            {{ [[seconds, 0] | max, remaining] | min }}
          {% endif %}

      - name: Boiler Peak Decision
        unique_id: boiler_peak_decision
        state: >
          {% set predicted_wh = states('sensor.boiler_predicted_with_boiler_wh') | float(0) %}
          {% set max_wh = states('sensor.boiler_quarter_max_energy_wh') | float(0) %}
          {% set safety_wh = states('input_number.boiler_peak_safety_margin_wh') | float(0) %}
          {% set quarter_energy_wh = states('sensor.boiler_quarter_energy_wh') | float(0) %}
          {% set latest_safe_off = states('sensor.boiler_latest_safe_off_seconds') | int(0) %}
          {% set runtime = states('sensor.shelly_boiler_runtime') | int(0) %}
          {% set min_on = states('input_number.boiler_peak_min_on_seconds') | int(60) %}
          {% if max_wh <= 0 %}
            ok
          {% elif quarter_energy_wh >= max_wh %}
            exceeded
          {% elif latest_safe_off <= 0 and runtime < min_on %}
            min_on_hold
          {% elif latest_safe_off <= 0 %}
            stop
          {% elif predicted_wh > (max_wh - safety_wh) %}
            run_until_off
          {% else %}
            ok
          {% endif %}

      - name: Boiler Peak Margin W
        unique_id: boiler_peak_margin_w
        unit_of_measurement: W
        device_class: power
        state_class: measurement
        state: >
          {{
            (
              states('sensor.boiler_peak_limit') | float(0)
              -
              states('sensor.boiler_predicted_quarter_peak_w') | float(0)
            ) | round(0)
          }}

      - name: Boiler House Power
        unique_id: boiler_house_power
        unit_of_measurement: W
        device_class: power
        state: >
          {% set source_state = states('sensor.verbruik_boven_4') %}
          {% set source_w = source_state | float(0) %}
          {% set previous_w = this.state | float(0) if this is defined else 0 %}

          {% if source_state in ['unknown', 'unavailable', 'none'] %}
            {{ previous_w | round(0) }}
          {% elif source_w <= 0 and previous_w > 0 %}
            {{ previous_w | round(0) }}
          {% else %}
            {{ source_w | round(0) }}
          {% endif %}

      - name: Boiler Peak Limit
        unique_id: boiler_peak_limit
        unit_of_measurement: W
        device_class: power
        state: >
          {{ states('input_number.boiler_peak_limit') | float(0) | round(0) }}

      - name: Boiler Power
        unique_id: boiler_power
        unit_of_measurement: W
        device_class: power
        state: >
          {{ states('input_number.boiler_power') | float(0) | round(0) }}

      - name: Shelly Boiler Relay Numeric
        unique_id: shelly_boiler_relay_numeric
        unit_of_measurement: "1"
        state_class: measurement
        state: >
          {{ 1 if is_state('binary_sensor.shelly_boiler_relay', 'on') else 0 }}

      - name: Shelly Boiler Restart Delay Active Numeric
        unique_id: shelly_boiler_restart_delay_active_numeric
        unit_of_measurement: "1"
        state_class: measurement
        state: >
          {{ 1 if is_state('binary_sensor.shelly_boiler_restart_delay_active', 'on') else 0 }}

      - name: Shelly Boiler Warm Enough Numeric
        unique_id: shelly_boiler_warm_enough_numeric
        unit_of_measurement: "1"
        state_class: measurement
        state: >
          {{ 1 if is_state('binary_sensor.shelly_boiler_warm_enough', 'on') else 0 }}

      - name: Boiler Reason
        unique_id: boiler_reason
        state: >
          {% if is_state('input_boolean.boiler_controller_enabled', 'off') %}
            2
          {% elif is_state('binary_sensor.shelly_boiler_warm_enough', 'on') %}
            3
          {% elif not (
              is_state('binary_sensor.boiler_superdal', 'on')
              or
              is_state('binary_sensor.boiler_nachtuur', 'on')
              or
              is_state('input_boolean.boiler_superdal_force', 'on')
          ) %}
            1
          {% elif states('sensor.boiler_peak_decision') in ['stop', 'exceeded'] %}
            5
          {% else %}
            0
          {% endif %}

      - name: Boiler Reason Text
        unique_id: boiler_reason_text
        state: >
          {% set reason = states('sensor.boiler_reason') | int %}

          {% if reason == 0 %}
            OK
          {% elif reason == 1 %}
            Geen superdaluren
          {% elif reason == 2 %}
            Controller uitgeschakeld
          {% elif reason == 3 %}
            Boiler vandaag reeds verwarmd
          {% elif reason == 4 %}
            Wachttijd actief
          {% elif reason == 5 %}
            Verwachte kwartierpiek te hoog
          {% elif reason == 6 %}
            Communicatieprobleem
          {% elif reason == 7 %}
            Fallback actief
          {% else %}
            Onbekend
          {% endif %}

      - name: Boiler Controller State
        unique_id: boiler_controller_state
        state: >
          {% set reason = states('sensor.boiler_reason') | int %}

          {% if is_state('sensor.shelly_boiler_state', 'HEATING') %}
            HEATING
          {% elif is_state('binary_sensor.shelly_boiler_relay', 'on') %}
            HEATING
          {% elif reason == 0 %}
            READY
          {% elif reason == 2 %}
            DISABLED
          {% elif reason == 3 %}
            LOCKED
          {% else %}
            WAITING
          {% endif %}

