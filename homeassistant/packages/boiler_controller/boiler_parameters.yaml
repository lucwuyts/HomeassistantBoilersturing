#
# Boiler Controller
# User configurable parameters
#
# Version: 0.1.0
#

input_number:

  boiler_power:
    name: Boiler Power
    icon: mdi:water-boiler
    min: 500
    max: 5000
    step: 100
    unit_of_measurement: W
    initial: 1800

  boiler_peak_limit:
    name: Boiler Peak Limit
    icon: mdi:flash
    min: 1000
    max: 10000
    step: 100
    unit_of_measurement: W
    initial: 3000

  boiler_peak_safety_margin_wh:
    name: Boiler Peak Safety Margin
    icon: mdi:flash-alert
    min: 0
    max: 250
    step: 10
    unit_of_measurement: Wh
    initial: 50

  boiler_peak_min_on_seconds:
    name: Boiler Peak Minimum On Time
    icon: mdi:timer-play
    min: 0
    max: 600
    step: 10
    unit_of_measurement: s
    initial: 60

  boiler_restart_power:
    name: Boiler Restart Power
    icon: mdi:transmission-tower
    min: 0
    max: 2000
    step: 100
    unit_of_measurement: W
    initial: 500

  boiler_restart_delay:
    name: Boiler Restart Delay
    icon: mdi:timer
    min: 5
    max: 60
    step: 5
    unit_of_measurement: min
    initial: 15

  boiler_stop_hold:
    name: Boiler Stop Hold
    icon: mdi:timer-pause
    min: 1
    max: 30
    step: 1
    unit_of_measurement: min
    initial: 5

  boiler_max_runtime:
    name: Boiler Maximum Runtime
    icon: mdi:timer
    min: 60
    max: 21600
    step: 60
    unit_of_measurement: s
    initial: 10800

input_text:

  boiler_warm_enough_reset_date:
    name: Boiler Warm Enough Reset Date
    icon: mdi:calendar-check
    max: 10
