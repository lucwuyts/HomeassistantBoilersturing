script:

  #############################################################
  #
  # Boiler Controller
  #
  # Bestand : scripts.yaml
  # Versie  : 0.4.1
  #
  # Wijzigingen:
  #   0.4.1
  #     - MQTT controllerbericht uitgebreid met energy-metingen
  #       voor lokale piekbeslissing door Shelly
  #   0.4.0
  #     - Toegevoegd:
  #         boiler_publish_controller
  #
  #############################################################

  #############################################################
  #
  # Centrale routine voor alle state-overgangen.
  #
  #############################################################

  boiler_set_state:

    alias: Boiler Controller - Set State

    mode: single

    fields:

      state:
        name: State
        required: true

      reason:
        name: Reason
        required: true

      message:
        name: Message
        required: false

    sequence:

      #########################################################
      # Maak lokale variabelen
      #########################################################

      - variables:

          old_state: "{{ states('input_select.boiler_state') }}"
          new_state: "{{ state }}"
          new_reason: "{{ reason }}"
          new_message: "{{ message | default('', true) }}"

      #########################################################
      # Update controller state
      #########################################################

      - service: input_select.select_option
        target:
          entity_id: input_select.boiler_state
        data:
          option: "{{ new_state }}"

      #########################################################
      # Update controller reason
      #########################################################

      - service: input_select.select_option
        target:
          entity_id: input_select.boiler_reason
        data:
          option: "{{ new_reason }}"

      #########################################################
      # Update timestamp
      #########################################################

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.boiler_state_since
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      #########################################################
      # Update laatste boodschap
      #########################################################

      - service: input_text.set_value
        target:
          entity_id: input_text.boiler_last_message
        data:
          value: "{{ new_message }}"

      #########################################################
      # Debug logging
      #########################################################

      - service: system_log.write
        data:
          level: warning
          message: >
            BOILER CONTROLLER:
            {{ old_state }}
            ->
            {{ new_state }}
            ({{ new_reason }})

  #############################################################
  #
  # Publiceer configuratie en energiemetingen naar de Shelly.
  #
  # Shelly blijft de controller en beslist lokaal over relais,
  # runtime, restart delay en piekbeveiliging.
  #
  #############################################################

  boiler_publish_controller:

    alias: Boiler Controller - Publish Controller

    mode: single

    sequence:

      #########################################################
      # Lokale variabelen
      #########################################################

      - variables:

          heating_enabled: >
            {{ is_state('binary_sensor.boiler_heating_allowed', 'on') }}

          max_runtime: >
            {{ states('input_number.boiler_max_runtime') | int(10800) }}

          restart_delay: >
            {{ states('input_number.boiler_restart_delay') | int(15) * 60 }}

          stop_hold: >
            {{ states('input_number.boiler_stop_hold') | int(5) * 60 }}

          peak_safety_margin_wh: >
            {{ states('input_number.boiler_peak_safety_margin_wh') | float(50) | round(1) }}

          peak_min_on_seconds: >
            {{ states('input_number.boiler_peak_min_on_seconds') | int(60) }}

          peak_limit: >
            {{ states('sensor.boiler_peak_limit') | float(0) | round(0) }}

          boiler_power: >
            {{ states('sensor.boiler_power') | float(0) | round(0) }}

          house_power: >
            {{ states('sensor.boiler_house_power') | float(0) | round(0) }}

          quarter_elapsed_seconds: >
            {{ ((now().minute % 15) * 60 + now().second) | int }}

      - variables:

          quarter_remaining_seconds: >
            {{ [900 - (quarter_elapsed_seconds | int(0)), 0] | max }}

          quarter_energy_wh: >
            {% set average_state = states('sensor.peak_current_average_quarterly_demand_2') %}
            {% set average_so_far_w = average_state | float(0) * 1000 %}
            {% if average_state in ['unknown', 'unavailable', 'none'] %}
              {{ states('sensor.boiler_quarter_energy_wh') | float(0) | round(1) }}
            {% else %}
              {{ (average_so_far_w * (quarter_elapsed_seconds | int(0)) / 3600) | round(1) }}
            {% endif %}

          quarter_max_energy_wh: >
            {{ (peak_limit | float(0) * 0.25) | round(1) }}

      - variables:

          predicted_with_boiler_wh: >
            {% set boiler_add_w = (boiler_power | float(0)) if not is_state('binary_sensor.shelly_boiler_relay', 'on') else 0 %}
            {% set projected_power_w = house_power | float(0) + boiler_add_w %}
            {{
              (
                quarter_energy_wh | float(0)
                +
                (projected_power_w * (quarter_remaining_seconds | int(0)) / 3600)
              ) | round(1)
            }}

          predicted_without_boiler_wh: >
            {% if is_state('binary_sensor.shelly_boiler_relay', 'on') %}
              {% set projected_power_w = [(house_power | float(0)) - (boiler_power | float(0)), 0] | max %}
            {% else %}
              {% set projected_power_w = house_power | float(0) %}
            {% endif %}
            {{
              (
                quarter_energy_wh | float(0)
                +
                (projected_power_w * (quarter_remaining_seconds | int(0)) / 3600)
              ) | round(1)
            }}

      - variables:

          peak_headroom_wh: >
            {{ ((quarter_max_energy_wh | float(0)) - (predicted_with_boiler_wh | float(0))) | round(1) }}

          latest_safe_off_seconds: >
            {% set current_power_w = house_power | float(0) %}
            {% set boiler_power_w = boiler_power | float(0) %}
            {% if is_state('binary_sensor.shelly_boiler_relay', 'on') %}
              {% set without_boiler_w = [current_power_w - boiler_power_w, 0] | max %}
            {% else %}
              {% set without_boiler_w = current_power_w %}
            {% endif %}
            {% set allowed_wh = (quarter_max_energy_wh | float(0)) - (peak_safety_margin_wh | float(0)) %}
            {% set without_boiler_future_wh = without_boiler_w * (quarter_remaining_seconds | int(0)) / 3600 %}
            {% if boiler_power_w <= 0 %}
              {{ quarter_remaining_seconds | int(0) }}
            {% else %}
              {% set seconds = ((allowed_wh - (quarter_energy_wh | float(0)) - without_boiler_future_wh) * 3600 / boiler_power_w) | int(0) %}
              {{ [[seconds, 0] | max, quarter_remaining_seconds | int(0)] | min }}
            {% endif %}

          predicted_quarter_peak: >
            {{ ((predicted_with_boiler_wh | float(0)) * 4) | round(0) }}

      - variables:

          peak_margin: >
            {{ ((peak_limit | float(0)) - (predicted_quarter_peak | float(0))) | round(0) }}

          peak_decision: >
            {% set predicted_wh = predicted_with_boiler_wh | float(0) %}
            {% set max_wh = quarter_max_energy_wh | float(0) %}
            {% set safety_wh = peak_safety_margin_wh | float(0) %}
            {% set quarter_wh = quarter_energy_wh | float(0) %}
            {% set latest_safe_off = latest_safe_off_seconds | int(0) %}
            {% set runtime = states('sensor.shelly_boiler_runtime') | int(0) %}
            {% set min_on = peak_min_on_seconds | int(60) %}
            {% if max_wh <= 0 %}
              ok
            {% elif quarter_wh >= max_wh %}
              exceeded
            {% elif latest_safe_off <= 0 and runtime < min_on %}
              min_on_hold
            {% elif latest_safe_off <= 0 %}
              stop
            {% elif predicted_wh > (max_wh - safety_wh) %}
              run_until_off
            {% else %}
              ok
            {% endif %}

      #########################################################
      # Publiceer MQTT bericht
      #########################################################

      - service: mqtt.publish
        data:
          topic: boiler/v1/controller
          qos: 1
          retain: true
          payload: >
            {
              "api": 1,
              "source": "EnergyManager",
              "software": "BEM 0.1.0",
              "timestamp": "{{ now().isoformat() }}",
              "boiler":
              {
                "config":
                {
                  "heating_enabled": {{ heating_enabled | lower }},
                  "max_runtime": {{ max_runtime }},
                  "restart_delay": {{ restart_delay }},
                  "stop_hold": {{ stop_hold }},
                  "peak_safety_margin_wh": {{ peak_safety_margin_wh }},
                  "peak_min_on_seconds": {{ peak_min_on_seconds }}
                },
                "energy":
                {
                  "predicted_quarter_peak": {{ predicted_quarter_peak }},
                  "peak_limit": {{ peak_limit }},
                  "peak_margin": {{ peak_margin }},
                  "boiler_power": {{ boiler_power }},
                  "house_power": {{ house_power }},
                  "quarter_elapsed_seconds": {{ quarter_elapsed_seconds }},
                  "quarter_remaining_seconds": {{ quarter_remaining_seconds }},
                  "quarter_energy_wh": {{ quarter_energy_wh }},
                  "quarter_max_energy_wh": {{ quarter_max_energy_wh }},
                  "predicted_with_boiler_wh": {{ predicted_with_boiler_wh }},
                  "predicted_without_boiler_wh": {{ predicted_without_boiler_wh }},
                  "peak_headroom_wh": {{ peak_headroom_wh }},
                  "latest_safe_off_seconds": {{ latest_safe_off_seconds }},
                  "peak_decision": "{{ peak_decision | trim }}"
                }
              }
            }

      #########################################################
      # Logging
      #########################################################

      - service: system_log.write
        data:
          level: info
          message: >
            BOILER CONTROLLER:
            MQTT controller configuration published

  #############################################################
  #
  # Reset Shelly statistieken.
  #
  # Dit is bewust een apart command en wordt niet retained
  # gepubliceerd, zodat een reset niet opnieuw uitgevoerd wordt
  # na een MQTT- of Shelly-herstart.
  #
  #############################################################

  boiler_reset_statistics:

    alias: Boiler Controller - Reset Statistics

    mode: single

    sequence:

      - service: mqtt.publish
        data:
          topic: boiler/v1/controller
          qos: 1
          retain: false
          payload: >
            {
              "api": 1,
              "source": "EnergyManager",
              "software": "BEM 0.1.0",
              "timestamp": "{{ now().isoformat() }}",
              "boiler":
              {
                "command":
                {
                  "reset_statistics": true
                }
              }
            }

      - service: system_log.write
        data:
          level: warning
          message: >
            BOILER CONTROLLER:
            MQTT reset statistics command published

  #############################################################
  #
  # Reset Shelly warm-enough vlag.
  #
  # Dit gebeurt bewust als apart niet-retained command. De vlag
  # hoort alleen bij een nieuwe superdalcyclus gereset te worden,
  # niet bij elk tariefvenster waarin verwarmen toegestaan is.
  #
  #############################################################

  boiler_reset_warm_enough:

    alias: Boiler Controller - Reset Warm Enough

    mode: single

    sequence:

      - service: mqtt.publish
        data:
          topic: boiler/v1/controller
          qos: 1
          retain: false
          payload: >
            {
              "api": 1,
              "source": "EnergyManager",
              "software": "BEM 0.1.0",
              "timestamp": "{{ now().isoformat() }}",
              "boiler":
              {
                "command":
                {
                  "reset_warm_enough": true
                }
              }
            }

      - service: system_log.write
        data:
          level: info
          message: >
            BOILER CONTROLLER:
            MQTT reset warm enough command published

