script:

  #############################################################
  #
  # Boiler Controller
  #
  # Bestand : scripts.yaml
  # Versie  : 0.3.0
  #
  # Centrale routine voor alle state-overgangen.
  #
  #############################################################

  boiler_set_state:
    alias: Boiler Controller - Set State
    mode: single

    fields:

      state:
        name: State
        required: true

      reason:
        name: Reason
        required: true

      message:
        name: Message
        required: false

    sequence:

      #########################################################
      # Maak lokale variabelen
      #########################################################

      - variables:
          old_state: "{{ states('input_select.boiler_state') }}"
          new_state: "{{ state }}"
          new_reason: "{{ reason }}"
          new_message: "{{ message | default('', true) }}"

      #########################################################
      # Update controller state
      #########################################################

      - service: input_select.select_option
        target:
          entity_id: input_select.boiler_state
        data:
          option: "{{ new_state }}"

      #########################################################
      # Update controller reason
      #########################################################

      - service: input_select.select_option
        target:
          entity_id: input_select.boiler_reason
        data:
          option: "{{ new_reason }}"

      #########################################################
      # Update timestamp
      #########################################################

      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.boiler_state_since
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      #########################################################
      # Update laatste boodschap
      #########################################################

      - service: input_text.set_value
        target:
          entity_id: input_text.boiler_last_message
        data:
          value: "{{ new_message }}"

      #########################################################
      # Debug logging
      #########################################################

      - service: system_log.write
        data:
          level: warning
          message: >
            BOILER CONTROLLER:
            {{ old_state }}
            ->
            {{ new_state }}
            ({{ new_reason }})