automation:

  #
  # BC003
  #
  - id: boiler_publish_mqtt_controller
    alias: "BC003 - Publish MQTT Controller"

    trigger:
      - platform: homeassistant
        event: start

      - platform: time_pattern
        seconds: "/30"

      - platform: state
        entity_id:
          - binary_sensor.boiler_heating_allowed
          - input_number.boiler_peak_limit
          - input_number.boiler_peak_safety_margin_wh
          - input_number.boiler_peak_min_on_seconds
          - input_number.boiler_power
          - input_number.boiler_max_runtime
          - input_number.boiler_restart_delay
          - input_number.boiler_stop_hold

      - platform: state
        entity_id: input_boolean.energy_new_quarter
        to: "on"

    action:

      - service: script.boiler_publish_controller

    mode: restart

  #
  # BC004
  #
  - id: boiler_reset_warm_enough_on_superdal
    alias: "BC004 - Reset Warm Enough On Superdal"

    trigger:
      - platform: state
        entity_id: binary_sensor.boiler_superdal
        to: "on"

    action:

      - service: script.boiler_reset_warm_enough

    mode: single

  #
  # BC005
  #
  - id: boiler_shelly_offline_alert
    alias: "BC005 - Shelly Boiler Offline Alert"

    trigger:
      - platform: state
        entity_id: binary_sensor.boiler_shelly_offline
        to: "on"
        for: "00:01:00"

    action:

      - service: script.whatsapp_callmebot_checked_send
        metadata: {}
        data:
          text: >
            Shelly - geen antwoord meer sedert
            {{ states('sensor.boiler_shelly_last_seen') }}

      - service: persistent_notification.create
        data:
          notification_id: boiler_shelly_offline
          title: "Shelly boilercontroller offline"
          message: >
            Shelly boilercontroller is langer dan 5 minuten offline.
            Controleer Shelly Pro 1 / wifi / voeding.

      - service: logbook.log
        data:
          name: "Boiler Controller"
          message: >
            Shelly boilercontroller is langer dan 5 minuten offline.
          entity_id: binary_sensor.boiler_shelly_offline

    mode: single


  #
  # BC006
  #
  - id: boiler_shelly_online_recovery
    alias: "BC006 - Shelly Boiler Online Recovery"

    trigger:
      - platform: state
        entity_id: binary_sensor.boiler_shelly_offline
        to: "off"

    action:

      - service: script.whatsapp_callmebot_checked_send
        metadata: {}
        data:
          text: >
            Shelly - opnieuw bereikbaar sinds
            {{ states('sensor.boiler_shelly_last_seen') }}

      - service: persistent_notification.dismiss
        data:
          notification_id: boiler_shelly_offline

      - service: persistent_notification.create
        data:
          notification_id: boiler_shelly_online
          title: "Shelly boilercontroller online"
          message: >
            Shelly boilercontroller is opnieuw online.

      - service: logbook.log
        data:
          name: "Boiler Controller"
          message: >
            Shelly boilercontroller is opnieuw online.
          entity_id: binary_sensor.boiler_shelly_offline

    mode: single

