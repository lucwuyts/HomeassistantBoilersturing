# Boiler Controller Parameters Card
#
# Gebruik:
#   Kopieer deze Lovelace YAML in een dashboard view/card.
#   De kaart gebruikt alleen standaard Home Assistant cards.

type: vertical-stack
cards:
  - type: entities
    title: Boiler parameters
    show_header_toggle: false
    entities:
      - entity: input_number.boiler_power
        name: Boiler vermogen
      - entity: input_number.boiler_peak_limit
        name: Pieklimiet
      - entity: input_number.boiler_peak_safety_margin_wh
        name: Piek veiligheidsmarge
      - entity: input_number.boiler_peak_min_on_seconds
        name: Minimum aan-tijd piekstop

  - type: entities
    title: Boiler timers
    show_header_toggle: false
    entities:
      - entity: input_number.boiler_max_runtime
        name: Maximum runtime
      - entity: input_number.boiler_restart_delay
        name: Restart delay
      - entity: input_number.boiler_stop_hold
        name: Stop-hold

  - type: entities
    title: Boiler planning
    show_header_toggle: false
    entities:
      - entity: binary_sensor.boiler_heating_allowed
        name: Verwarmen toegestaan
      - entity: sensor.boiler_peak_decision
        name: Piekbeslissing
