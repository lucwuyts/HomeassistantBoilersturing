mqtt:

  sensor:

    - name: Shelly Boiler State
      unique_id: shelly_boiler_state
      state_topic: boiler/v1/status
      value_template: >
        {{ value_json.boiler.status.state | default('unknown') }}

    - name: Boiler Shelly Last Seen
      unique_id: boiler_shelly_last_seen
      state_topic: boiler/v1/status
      device_class: timestamp
      value_template: >
        {{ value_json.timestamp | default(value_json.boiler.status.last_update) | default('') }}

    - name: Shelly Boiler Uptime
      unique_id: shelly_boiler_uptime
      state_topic: boiler/v1/status
      unit_of_measurement: s
      state_class: measurement
      value_template: >
        {{ value_json.boiler.status.uptime | default(0) }}

    - name: Shelly Boiler WiFi RSSI
      unique_id: shelly_boiler_wifi_rssi
      state_topic: boiler/v1/status
      unit_of_measurement: dBm
      device_class: signal_strength
      state_class: measurement
      value_template: >
        {{ value_json.boiler.status.wifi_rssi | default(0) }}

    - name: Shelly Boiler RAM Free
      unique_id: shelly_boiler_ram_free
      state_topic: boiler/v1/status
      unit_of_measurement: B
      device_class: data_size
      state_class: measurement
      value_template: >
        {{ value_json.boiler.status.ram_free | default(0) }}

    - name: Shelly Boiler Firmware Version
      unique_id: shelly_boiler_firmware_version
      state_topic: boiler/v1/status
      value_template: >
        {{ value_json.boiler.status.firmware_version | default('') }}

    - name: Shelly Boiler Script Version
      unique_id: shelly_boiler_script_version
      state_topic: boiler/v1/status
      value_template: >
        {{ value_json.boiler.status.script_version | default(value_json.firmware) | default('') }}

    - name: Shelly Boiler Last MQTT Seen
      unique_id: shelly_boiler_last_mqtt_seen
      state_topic: boiler/v1/status
      value_template: >
        {{ value_json.boiler.status.last_mqtt_seen | default('') }}

    - name: Shelly Boiler Last Controller Age
      unique_id: shelly_boiler_last_controller_age
      state_topic: boiler/v1/status
      unit_of_measurement: s
      state_class: measurement
      value_template: >
        {{ value_json.boiler.status.last_controller_age | default(0) }}

    - name: Shelly Boiler Watchdog Reboots
      unique_id: shelly_boiler_watchdog_reboots
      state_topic: boiler/v1/status
      state_class: total_increasing
      value_template: >
        {{ value_json.boiler.status.watchdog_reboots | default(0) }}

    - name: Shelly Boiler Watchdog Reason
      unique_id: shelly_boiler_watchdog_reason
      state_topic: boiler/v1/status
      value_template: >
        {{ value_json.boiler.status.watchdog_reason | default('') }}

    - name: Shelly Boiler Runtime
      unique_id: shelly_boiler_runtime
      state_topic: boiler/v1/status
      unit_of_measurement: s
      state_class: measurement
      value_template: >
        {{ value_json.boiler.status.runtime | default(0) }}

    - name: Shelly Boiler Restart Remaining
      unique_id: shelly_boiler_restart_remaining
      state_topic: boiler/v1/status
      unit_of_measurement: s
      state_class: measurement
      value_template: >
        {{ value_json.boiler.status.restart_remaining | default(0) }}

    - name: Shelly Boiler Boot Delay Remaining
      unique_id: shelly_boiler_boot_delay_remaining
      state_topic: boiler/v1/status
      unit_of_measurement: s
      state_class: measurement
      value_template: >
        {{ value_json.boiler.status.boot_delay_remaining | default(0) }}

    - name: Shelly Boiler Last Stop Reason
      unique_id: shelly_boiler_last_stop_reason
      state_topic: boiler/v1/status
      value_template: >
        {{ value_json.boiler.status.last_stop_reason | default('') }}

    - name: Shelly Boiler Last Controller Update
      unique_id: shelly_boiler_last_controller_update
      state_topic: boiler/v1/status
      value_template: >
        {{ value_json.boiler.status.last_controller_update | default('') }}

    - name: Shelly Boiler Controller Timeout
      unique_id: shelly_boiler_controller_timeout
      state_topic: boiler/v1/status
      unit_of_measurement: s
      state_class: measurement
      value_template: >
        {{ value_json.boiler.status.controller_timeout | default(0) }}

    - name: Shelly Boiler Warm Enough Since
      unique_id: shelly_boiler_warm_enough_since
      state_topic: boiler/v1/status
      value_template: >
        {{ value_json.boiler.status.warm_enough_since | default('') }}

    - name: Shelly Boiler Warmup Min Runtime
      unique_id: shelly_boiler_warmup_min_runtime
      state_topic: boiler/v1/status
      unit_of_measurement: s
      state_class: measurement
      value_template: >
        {{ value_json.boiler.status.warmup_min_runtime | default(0) }}

    - name: Shelly Boiler Starts Today
      unique_id: shelly_boiler_starts_today
      state_topic: boiler/v1/status
      state_class: total
      value_template: >
        {{ value_json.boiler.status.starts_today | default(0) }}

    - name: Shelly Boiler Total Starts
      unique_id: shelly_boiler_total_starts
      state_topic: boiler/v1/status
      state_class: total_increasing
      value_template: >
        {{ value_json.boiler.status.total_starts | default(0) }}

    - name: Shelly Boiler Total Runtime
      unique_id: shelly_boiler_total_runtime
      state_topic: boiler/v1/status
      unit_of_measurement: s
      state_class: total_increasing
      value_template: >
        {{ value_json.boiler.status.total_runtime | default(0) }}

    - name: Shelly Boiler Peak Margin
      unique_id: shelly_boiler_peak_margin
      state_topic: boiler/v1/status
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      value_template: >
        {{ value_json.boiler.energy.peak_margin | default(0) }}

    - name: Shelly Boiler Predicted Quarter Peak
      unique_id: shelly_boiler_predicted_quarter_peak
      state_topic: boiler/v1/status
      unit_of_measurement: W
      device_class: power
      state_class: measurement
      value_template: >
        {{ value_json.boiler.energy.predicted_quarter_peak | default(0) }}

  binary_sensor:

    - name: Shelly Boiler Relay
      unique_id: shelly_boiler_relay
      state_topic: boiler/v1/status
      payload_on: 'true'
      payload_off: 'false'
      value_template: >
        {{ value_json.boiler.status.relay | default(false) | lower }}

    - name: Shelly Boiler Restart Delay Active
      unique_id: shelly_boiler_restart_delay_active
      state_topic: boiler/v1/status
      payload_on: 'true'
      payload_off: 'false'
      value_template: >
        {{ value_json.boiler.status.restart_delay_active | default(false) | lower }}

    - name: Shelly Boiler Boot Delay Active
      unique_id: shelly_boiler_boot_delay_active
      state_topic: boiler/v1/status
      payload_on: 'true'
      payload_off: 'false'
      value_template: >
        {{ value_json.boiler.status.boot_delay_active | default(false) | lower }}

    - name: Shelly Boiler Watchdog
      unique_id: shelly_boiler_watchdog
      state_topic: boiler/v1/status
      payload_on: 'true'
      payload_off: 'false'
      value_template: >
        {{ value_json.boiler.status.watchdog | default(false) | lower }}

    - name: Shelly Boiler WiFi Connected
      unique_id: shelly_boiler_wifi_connected
      state_topic: boiler/v1/status
      payload_on: 'true'
      payload_off: 'false'
      value_template: >
        {{ value_json.boiler.status.wifi_connected | default(false) | lower }}

    - name: Shelly Boiler MQTT Connected
      unique_id: shelly_boiler_mqtt_connected
      state_topic: boiler/v1/status
      payload_on: 'true'
      payload_off: 'false'
      value_template: >
        {{ value_json.boiler.status.mqtt_connected | default(false) | lower }}

    - name: Shelly Boiler Controller Online
      unique_id: shelly_boiler_controller_online
      state_topic: boiler/v1/status
      payload_on: 'true'
      payload_off: 'false'
      value_template: >
        {{ value_json.boiler.status.controller_online | default(false) | lower }}

    - name: Shelly Boiler Warm Enough
      unique_id: shelly_boiler_warm_enough
      state_topic: boiler/v1/status
      payload_on: 'true'
      payload_off: 'false'
      value_template: >
        {{ value_json.boiler.status.warm_enough | default(false) | lower }}
